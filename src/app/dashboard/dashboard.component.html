<div class="body">
  <div *ngIf="is_show == true">

    <div class="tab-header">
      <button *ngFor="let tab of dashboardTabs; let i = index" class="tab-btn" [class.active]="selectedTab === i"
        (click)="selectedTab = i">
        {{ tab.title }}
      </button>
    </div>

    <div class="tab-content">
      <ng-container *ngFor="let tab of dashboardTabs; let i = index">
        <iframe *ngIf="selectedTab === i" [src]="tab.url" width="100%" height="1800px" frameborder="0"></iframe>
      </ng-container>
    </div>

  </div>

  <div class="inner-body" *ngIf="is_show == false">
    <div class="welcome-container">
      <span class="welcome-title">Welcome</span>
      <br />
      <span class="welcome-username">
        {{ decreptedUserName | uppercase }}
      </span>
      <br />
      <span class="welcome-email">
        <span nz-icon nzType="mail" nzTheme="twotone"></span>
        {{ decryptedEmail }}
      </span>
    </div>
  </div>
</div>
